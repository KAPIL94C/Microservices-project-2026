##MYSQL CONNECTION
spring.datasource.url = jdbc:mysql://localhost:3306/emp_db
spring.datasource.username = root
spring.datasource.password = kapil

##JPA CONFIGURATION
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.application.name=employee-service
server.port=8082
eureka.client.serviceUrl.defaultZone=http://localhost:9091/eureka/


############# Eureka Client Configuration ##################
eureka.instance.hostname=localhost
eureka.instance.preferIpAddress=false 

# enable all actuator endpoints
management.endpoints.web.exposure.include=*

# httpclient configuration for spring cloud gateway
spring.cloud.gateway.httpclient.connect-timeout=1000
spring.cloud.gateway.httpclient.response-timeout=5s




########## resilience4j circuit breaker configuration ##################
# If this is missing ? actuator will NOT register it.
resilience4j.circuitbreaker.instances.userService.baseConfig=default
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10000

# retry configuration for resilience4j
resilience4j.retry.instances.userService.baseConfig=default
resilience4j.retry.configs.default.maxAttempts=4
resilience4j.retry.configs.default.waitDuration=2s
resilience4j.retry.configs.default.retryExceptions=org.springframework.web.client.ResourceAccessException, org.springframework.web.client.HttpServerErrorException
logging.level.io.github.resilience4j.retry=DEBUG

# Rate limiter configuration for resilience4j
resilience4j.ratelimiter.instances.userService.baseConfig=default
resilience4j.ratelimiter.configs.default.limitForPeriod=2
resilience4j.ratelimiter.configs.default.limitRefreshPeriod=10s
resilience4j.ratelimiter.configs.default.timeoutDuration=0
logging.level.io.github.resilience4j.ratelimiter=DEBUG
